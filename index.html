<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Ultra 140km · Passa Quatro</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0A0A0A; color: #F5F0E8; font-family: Georgia, serif; max-width: 430px; margin: 0 auto; min-height: 100vh; }
  button { cursor: pointer; font-family: Georgia, serif; }
  #header { padding: 28px 20px 20px; border-bottom: 2px solid rgba(82,183,136,0.27); transition: background 0.4s; }
  .header-tag { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 6px; }
  .header-title { font-size: 26px; font-weight: bold; line-height: 1.2; margin-bottom: 4px; }
  .header-sub { font-size: 13px; color: #AAA; font-style: italic; }
  #nav { display: flex; border-bottom: 1px solid #222; background: #111; }
  .nav-btn { flex: 1; padding: 12px 4px; background: none; border: none; border-bottom: 2px solid transparent; color: #666; font-size: 12px; transition: all 0.2s; }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  #content { padding: 0 0 80px; }
  .section-label { font-size: 11px; letter-spacing: 3px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
  .phase-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .phase-card { background: #161616; border: 1px solid #2A2A2A; border-radius: 10px; padding: 12px 10px; text-align: left; color: #F5F0E8; transition: all 0.2s; }
  .phase-card .icon { font-size: 18px; }
  .phase-card .name { font-size: 13px; font-weight: bold; margin-top: 4px; }
  .phase-card .subtitle { font-size: 10px; margin-top: 2px; }
  .phase-card .wks { font-size: 9px; color: #666; margin-top: 4px; }
  .phase-info { margin: 8px 16px; border-radius: 10px; padding: 14px; }
  .phase-info .period { font-size: 11px; letter-spacing: 2px; margin-bottom: 6px; }
  .phase-info .focus { font-size: 14px; margin-bottom: 10px; font-style: italic; }
  .phase-principle { font-size: 12px; color: #CCC; margin-bottom: 4px; padding-left: 12px; border-left: 2px solid rgba(82,183,136,0.4); }
  .week-btn { width: 100%; background: #141414; border: 1px solid #222; border-radius: 10px; padding: 14px; margin-bottom: 8px; text-align: left; color: #F5F0E8; display: flex; align-items: center; justify-content: space-between; }
  .week-btn.recovery { background: #1A1400; border-color: #3A3000; }
  .week-badge { font-size: 11px; font-weight: bold; padding: 2px 8px; border-radius: 20px; display: inline-block; }
  .week-type { font-size: 12px; color: #888; margin-top: 6px; }
  .week-fds { font-size: 11px; color: #666; margin-top: 2px; }
  .week-arrow { font-size: 18px; }
  .back-btn { background: none; border: none; padding: 14px 0; font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .day-card { background: #141414; border-radius: 12px; padding: 16px; margin-bottom: 10px; }
  .day-label { font-size: 11px; color: #666; letter-spacing: 2px; margin-bottom: 8px; }
  .day-type { font-size: 15px; font-weight: bold; margin-bottom: 6px; }
  .day-detail { font-size: 12px; color: #CCC; line-height: 1.6; }
  .aerobic-card { background: #0E1A14; border: 1px solid #2A4A3A; border-radius: 12px; padding: 14px; margin-bottom: 10px; }
  .remember-card { background: #1A1400; border: 1px solid #3A3000; border-radius: 12px; padding: 14px; }
  .remember-item { font-size: 11px; color: #888; margin-bottom: 4px; }
  .race-card { border-radius: 16px; padding: 20px; text-align: center; margin-bottom: 16px; }
  .habit-card { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 16px; margin-bottom: 10px; display: flex; gap: 14px; align-items: flex-start; }
  .habit-icon { font-size: 24px; min-width: 32px; }
  .habit-text { font-size: 13px; color: #CCC; line-height: 1.6; }
  .green-box { background: #0E1A14; border: 1px solid #2A4A3A; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .green-box-title { font-size: 13px; font-weight: bold; color: #52B788; margin-bottom: 12px; }
  .benchmark { margin-bottom: 10px; padding-left: 10px; border-left: 2px solid rgba(82,183,136,0.53); }
  .benchmark-text { font-size: 12px; color: #CCC; }
  .benchmark-result { font-size: 11px; color: #52B788; margin-top: 2px; }
  .yellow-box { background: #1A1400; border: 1px solid #3A3000; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .yellow-box-title { font-size: 13px; font-weight: bold; color: #E2B714; margin-bottom: 12px; }
  .principle-item { font-size: 12px; color: #CCC; margin-bottom: 8px; padding-left: 10px; border-left: 2px solid rgba(226,183,20,0.4); }
  .strength-card { background: #141414; border: 1px solid #1E3A2A; border-radius: 12px; padding: 14px; margin-bottom: 8px; }
  .strength-name { font-size: 14px; font-weight: bold; color: #52B788; margin-bottom: 4px; }
  .strength-row { display: flex; justify-content: space-between; align-items: center; }
  .strength-sets { font-size: 12px; color: #AAA; }
  .strength-note { font-size: 11px; color: #666; font-style: italic; }
  .red-box { background: #1A0A0A; border: 1px solid #3A1A1A; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .red-box-title { font-size: 13px; font-weight: bold; color: #E07A5F; margin-bottom: 10px; }
  .red-item { font-size: 12px; color: #CCC; margin-bottom: 6px; padding-left: 10px; border-left: 2px solid rgba(224,122,95,0.4); }
  .blue-box { background: #0E0E1A; border: 1px solid #2A2A3A; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .blue-box-title { font-size: 13px; font-weight: bold; color: #7A8FE0; margin-bottom: 10px; }
  .schedule-row { display: flex; gap: 10px; margin-bottom: 6px; padding: 6px 8px; border-radius: 8px; }
  .schedule-day { font-size: 11px; color: #AAA; min-width: 36px; font-weight: bold; }
  .schedule-text { font-size: 11px; color: #CCC; }
  #footer { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 430px; background: #0D0D0D; border-top: 1px solid #222; padding: 10px 16px 20px; text-align: center; }
  .footer-text { font-size: 10px; color: #555; letter-spacing: 1px; }
  .pad { padding: 16px; }
  .pad8 { padding: 8px 16px; }
</style>
</head>

  <div class="header-tag" id="accent-tag">Ultra 140km · Passa Quatro MG</div>
  <div class="header-title">Plano de Treino</div>

</div>

  <button class="nav-btn" onclick="setView('strength')" id="nav-strength">💪 Força</button>
</div>
<div id="content"></div>
<div id="footer"><div class="footer-text">DURABILIDADE · FORÇA · CONSISTÊNCIA · 140KM</div></div>
<script>
const phases=[{id:0,name:"FASE 1",subtitle:"Base & Durabilidade",weeks:"Semanas 1–7",period:"Abr 07 → Mai 25",color:"#2D6A4F",accent:"#52B788",icon:"🌱",focus:"Reconstruir base aeróbica. Sem ego. Sem pressa.",principles:["Durabilidade > km totais","Caminhada nas subidas — sempre","Força 2× semana obrigatório","Recuperação é treino"],weeks_data:[{n:1,seg:{type:"Força",detail:"Agachamento 3×8, RDL 3×10, Elevação panturrilha 3×15, Prancha 3×30s"},qua:{type:"Ladeira curta",detail:"6×2min subida forte + aquecimento 15min fácil"},fds:{type:"Longo fácil",detail:"2h — corrida/caminhada. Plano ou trilha leve. FC baixo."},aerobic:"Caminhada inclinada 30min (ter ou qui)"},{n:2,seg:{type:"Força",detail:"Split squat 3×8/lado, Step-up 3×10, Farmer walk 3×40m, Core"},qua:{type:"Tempo leve",detail:"30min contínuo em esforço conversável (estradão ou trilha)"},fds:{type:"Longo fácil",detail:"2h30 — hike nas subidas, corre planos. Teste nutrição: 60g carb/h"},aerobic:"Bike ou caminhada 40min"},{n:3,seg:{type:"Força",detail:"Agachamento 3×10, RDL 3×10, Calf pesado 3×12, Box step-up"},qua:{type:"Ladeira longa",detail:"20–25min subida contínua moderada + volta caminhando"},fds:{type:"Longo fácil",detail:"2h30 — trilha variada. Mantém FC fácil. Come a cada 45min."},aerobic:"Caminhada inclinada 40min"},{n:4,seg:{type:"Força",detail:"Reduz carga 20%. Mesmos exercícios. Foco em mobilidade pós."},qua:{type:"Regenerativo",detail:"40min fácil — plano, sem subida. Sente o corpo."},fds:{type:"Longo curto",detail:"2h — mais fácil que semana 3. Semana de recuperação."},aerobic:"Mobilidade 10min diário + caminhada leve",recovery:true},{n:5,seg:{type:"Força",detail:"Aumenta carga. Agachamento 4×8, Farmer walk 4×40m, RDL 4×8"},qua:{type:"Ladeira curta",detail:"8×2min subida forte. Desce caminhando. Aquecimento 20min."},fds:{type:"Longo fácil",detail:"3h — mistura trilha + estradão. Simula terreno da prova."},aerobic:"Bike 45min"},{n:6,seg:{type:"Força",detail:"Pliometria leve: box jump 3×6, drop step. Força manutenção."},qua:{type:"Tempo",detail:"3×12min steadystate + 3min fácil. Esforço 'todo o dia forte'."},fds:{type:"Longo fácil",detail:"3h — trilha com ganho de altitude. Hike sobe, corre desce."},aerobic:"Caminhada inclinada 45min"},{n:7,seg:{type:"Força",detail:"Manutenção. Reduz volume 15%. Prioriza qualidade."},qua:{type:"Ladeira mista",detail:"Ladeira curta 6×2min + 15min subida longa contínua"},fds:{type:"Longo médio",detail:"2h30 — regenerativo. Prepara para Fase 2."},aerobic:"Mobilidade + caminhada",recovery:true}]},{id:1,name:"FASE 2",subtitle:"Construção Específica",weeks:"Semanas 8–16",period:"Mai 26 → Jul 27",color:"#1B4332",accent:"#40916C",icon:"⛰️",focus:"Volume aumenta. Específico para Passa Quatro. Força continua.",principles:["Simular terrenos da prova","Longos chegam a 5–6h","Nutrição testada e validada","Força 2× semana mantida"],weeks_data:[{n:8,seg:{type:"Força",detail:"Agachamento pesado 4×6, RDL 4×8, Calf 4×12, Farmer walk"},qua:{type:"Ladeira longa",detail:"2×20min subida contínua com 5min recuperação"},fds:{type:"Longo fácil",detail:"3h30 — trilha + estradão. Altitude simulada se possível."},aerobic:"Bike 45min ou caminhada inclinada"},{n:9,seg:{type:"Força",detail:"Manutenção. Box jump 3×8, Split squat 3×10, Core carries"},qua:{type:"Tempo",detail:"40min steadystate em esforço controlado. Estradão de terra."},fds:{type:"Longo fácil",detail:"4h — trilha com aclive. Hike subidas, corrida planos e descidas."},aerobic:"Caminhada inclinada 50min"},{n:10,seg:{type:"Força",detail:"Reduz 20%. Foco mobilidade quadril e tornozelo."},qua:{type:"Regenerativo",detail:"45min fácil. Nada de intensidade."},fds:{type:"Longo curto",detail:"2h30 — recuperação ativa. Semana fácil."},aerobic:"Mobilidade 15min diário",recovery:true},{n:11,seg:{type:"Força",detail:"Volta força plena. 4×8 todos exercícios principais."},qua:{type:"Ladeira curta",detail:"10×2min subida forte. Explosivo. Recupera descendo."},fds:{type:"Longo fácil",detail:"4h30 — mistura trilha + paralelepípedo + terra. Prova específico."},aerobic:"Bike 50min"},{n:12,seg:{type:"Força",detail:"Pliometria: drop jumps 3×6, box step-up com carga leve"},qua:{type:"Misto",detail:"Ladeira longa 25min + 20min tempo. Combina estímulos."},fds:{type:"Longo",detail:"5h — back-to-back se possível: Sáb 3h + Dom 2h. OU 5h contínuo."},aerobic:"Caminhada inclinada 50min"},{n:13,seg:{type:"Força",detail:"Manutenção leve. Prioriza recuperação do fim de semana."},qua:{type:"Tempo",detail:"3×15min steadystate + 3min recuperação. 45min total qualidade."},fds:{type:"Longo",detail:"5h — trilha com ganho vertical significativo. Come bem."},aerobic:"Bike 45min"},{n:14,seg:{type:"Força",detail:"Reduz volume 25%. Semana de recuperação."},qua:{type:"Regenerativo",detail:"50min fácil. Só aeróbico base."},fds:{type:"Longo médio",detail:"3h — fácil, recuperativo. Prepara para pico."},aerobic:"Mobilidade extensa + caminhada",recovery:true},{n:15,seg:{type:"Força",detail:"Força plena. Adiciona bag pack leve (5kg) no farmer walk."},qua:{type:"Ladeira longa",detail:"30min subida contínua moderada. Máximo esforço sustentável."},fds:{type:"Longo",detail:"5h30 — terreno variado. Simula o máximo possível a prova."},aerobic:"Bike 50min"},{n:16,seg:{type:"Força",detail:"Manutenção. Nada novo. Executa bem o que já sabe."},qua:{type:"Misto",detail:"Ladeiras + 20min tempo. Teste ritmo de prova."},fds:{type:"Longo PICO",detail:"6h — o maior treino do ciclo. Come 60–90g carb/h. Valida tudo."},aerobic:"Caminhada inclinada 50min"}]},{id:2,name:"FASE 3",subtitle:"Afunilamento",weeks:"Semanas 17–24",period:"Jul 28 → Set 21",color:"#7B2D00",accent:"#E07A5F",icon:"🔥",focus:"Mantém fitness. Reduz volume. Aguça velocidade e especificidade.",principles:["Qualidade > quantidade","Treinos específicos da prova","Força manutenção (1–2×)","Sono e nutrição prioridade máxima"],weeks_data:[{n:17,seg:{type:"Força",detail:"Manutenção. Reduz para 3×8. Mantém exercícios base."},qua:{type:"Ladeira específica",detail:"8×2min + 1×20min contínua. Simula perfil da prova."},fds:{type:"Longo",detail:"5h — trilha variada. Foco em técnica de descida."},aerobic:"Bike 40min"},{n:18,seg:{type:"Força leve",detail:"2×10 todos exercícios. Foco mobilidade."},qua:{type:"Tempo",detail:"45min steadystate. Ritmo que usará nos planos da prova."},fds:{type:"Longo",detail:"4h30 — simula trecho da prova: terra + trilha + asfalto."},aerobic:"Caminhada inclinada 40min"},{n:19,seg:{type:"Força",detail:"Manutenção normal."},qua:{type:"Regenerativo",detail:"45min fácil."},fds:{type:"Longo médio",detail:"3h — recuperação. Semana de descanso."},aerobic:"Mobilidade 15min/dia",recovery:true},{n:20,seg:{type:"Força",detail:"Pliometria: box jump 3×6. Agachamento 3×8. Core."},qua:{type:"Ladeira mista",detail:"Curta 6×2min + longa 1×20min. Alta qualidade."},fds:{type:"Longo",detail:"5h — terreno específico. Testa calçado, mochila, nutrição final."},aerobic:"Bike 40min"},{n:21,seg:{type:"Força leve",detail:"Reduz carga. Mantém padrões de movimento."},qua:{type:"Tempo",detail:"3×12min + 3min recuperação. Foco na forma de corrida."},fds:{type:"Longo",detail:"4h — trilha. Pratica alimentação noturna se prova for noite."},aerobic:"Caminhada inclinada 35min"},{n:22,seg:{type:"Força",detail:"Manutenção. Últimas sessões pesadas do ciclo."},qua:{type:"Ladeira longa",detail:"25min contínuos. Forte mas controlado."},fds:{type:"Longo médio",detail:"3h30 — tranquilo. Deixa energia para taper."},aerobic:"Bike 30min leve"},{n:23,seg:{type:"Força muito leve",detail:"2×8. Mobilidade extensa. Prepara para taper."},qua:{type:"Ladeira curta",detail:"6×2min — acorda as pernas. Nada mais."},fds:{type:"Longo curto",detail:"2h30 — fácil. Começo do taper."},aerobic:"Caminhada 30min",recovery:true},{n:24,seg:{type:"Força manutenção",detail:"2×8 leve. Últimas sessões de força."},qua:{type:"Tempo curto",detail:"25min steadystate. Afina ritmo."},fds:{type:"Médio",detail:"2h — fácil com alguns acelerados de 5min no meio."},aerobic:"Mobilidade diário"}]},{id:3,name:"FASE 4",subtitle:"Taper & Prova",weeks:"Semanas 25–28",period:"Set 22 → Nov 01",color:"#1A1A2E",accent:"#E2B714",icon:"🏆",focus:"Reduz volume. Mantém intensidade. Chega fresco e confiante.",principles:["Menos é mais","Confia no treino feito","Hidratação e sono perfeitos","Teste ZERO na semana da prova"],weeks_data:[{n:25,seg:{type:"Força leve",detail:"2×8 super leve. Mantém padrões."},qua:{type:"Ladeira curta",detail:"5×2min. Mantém pernas vivas."},fds:{type:"Médio",detail:"2h — tranquilo. Corpo em modo recarga."},aerobic:"Caminhada 25min",recovery:true},{n:26,seg:{type:"Força muito leve",detail:"1×10 cada exercício. Mobilidade."},qua:{type:"Curto",detail:"30min fácil + 4×1min no ritmo de prova."},fds:{type:"Curto",detail:"1h30 — fácil, trilha leve. Sente as pernas."},aerobic:"Mobilidade 15min/dia",recovery:true},{n:27,seg:{type:"Sem força",detail:"Só mobilidade e alongamento."},qua:{type:"Ativação",detail:"20min fácil + 3×2min no ritmo de prova."},fds:{type:"Curtíssimo",detail:"45min — fácil. Última saída antes da prova."},aerobic:"Caminhada leve + mobilidade",recovery:true},{n:28,seg:{type:"DESCANSO",detail:"Hidratação. Alimentação rica em carboidratos. Sono 8h+."},qua:{type:"DESCANSO",detail:"Última caminhada leve 15min. Mental forte."},fds:{type:"🏆 PROVA 140KM",detail:"PASSA QUATRO — NOVEMBRO. Você está pronto."},aerobic:"Nada. Só descanso.",recovery:true,race:true}]}];
let activePhase=0,activeWeek=null,currentView='plan';
function setView(v){currentView=v;activeWeek=null;['plan','habits','strength'].forEach(n=>{document.getElementById('nav-'+n).classList.toggle('active',n===v)});applyAccent();render()}
function applyAccent(){const p=phases[activePhase];document.documentElement.style.setProperty('--accent',p.accent);document.getElementById('header').style.background=`linear-gradient(135deg, ${p.color}CC, #0A0A0A)`;document.getElementById('header').style.borderBottomColor=p.accent+'44';document.getElementById('accent-tag').style.color=p.accent}
function setPhase(i){activePhase=i;activeWeek=null;applyAccent();render()}
function setWeek(i){activeWeek=i;render()}
function backToPhase(){activeWeek=null;render()}
function render(){const el=document.getElementById('content');if(currentView==='plan')el.innerHTML=renderPlan();else if(currentView==='habits')el.innerHTML=renderHabits();else el.innerHTML=renderStrength()}
function renderPlan(){const p=phases[activePhase];if(activeWeek!==null)return renderWeek(p,p.weeks_data[activeWeek]);let html='<div class="pad8">';html+=`<div class="section-label">Fases do Ciclo</div>`;html+='<div class="phase-grid">';phases.forEach((ph,i)=>{const isActive=i===activePhase;html+=`<button class="phase-card${isActive?' active':''}" onclick="setPhase(${i})" style="background:${isActive?ph.color:'#161616'};border-color:${isActive?ph.accent:'#2A2A2A'}"><div class="icon">${ph.icon}</div><div class="name">${ph.name}</div><div class="subtitle" style="color:${isActive?ph.accent:'#888'}">${ph.subtitle}</div><div class="wks">${ph.weeks}</div></button>`});html+='</div></div>';html+=`<div class="phase-info" style="background:${p.color}33;border:1px solid ${p.accent}44"><div class="period" style="color:${p.accent}">${p.period}</div><div class="focus">"${p.focus}"</div>${p.principles.map(pr=>`<div class="phase-principle" style="border-left-color:${p.accent}66">${pr}</div>`).join('')}</div>`;html+='<div class="pad8"><div class="section-label">Semanas</div>';p.weeks_data.forEach((w,i)=>{html+=`<button class="week-btn${w.race?' race':w.recovery?' recovery':''}" onclick="setWeek(${i})" style="${w.race?'border-color:'+p.accent:''}"><div><div><span class="week-badge" style="background:${w.race?p.accent:w.recovery?'#5C4A00':p.color};color:${w.race?'#000':'#FFF'}">S${w.n} ${w.race?'🏆':w.recovery?'💤':''}</span>${w.race?`<span style="font-size:11px;color:${p.accent};margin-left:8px">PROVA!</span>`:''}${w.recovery&&!w.race?'<span style="font-size:11px;color:#888;margin-left:8px">Recuperação</span>':''}</div><div class="week-type">${w.seg.type} · ${w.qua.type}</div><div class="week-fds">FDS: ${w.fds.type}</div></div><div class="week-arrow" style="color:${p.accent}">›</div></button>`});html+='</div>';return html}
function renderWeek(p,w){let html=`<div class="pad8"><button class="back-btn" onclick="backToPhase()" style="color:${p.accent}">‹ Voltar para ${p.name}</button><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><span class="week-badge" style="background:${w.race?p.accent:p.color};color:${w.race?'#000':'#FFF'};font-size:14px;padding:4px 12px">Semana ${w.n} ${w.race?'🏆':w.recovery?'💤':''}</span>${w.recovery&&!w.race?'<span style="font-size:12px;color:#888;font-style:italic">Semana de Recuperação</span>':''}</div>`;if(w.race){html+=`<div class="race-card" style="background:${p.accent}22;border:2px solid ${p.accent}"><div style="font-size:40px;margin-bottom:8px">🏆</div><div style="font-size:22px;font-weight:bold;color:${p.accent};margin-bottom:8px">PROVA 140KM</div><div style="font-size:14px;color:#CCC;margin-bottom:12px">Passa Quatro, MG · Novembro</div><div style="font-size:13px;color:#AAA;margin-bottom:12px">Terreno variado · Estradão + Trilha + Asfalto · ~1200m</div><div style="padding:12px;background:#0A0A0A;border-radius:10px"><div style="font-size:12px;font-weight:bold;color:${p.accent};margin-bottom:8px">Estratégia de Prova</div>${["Caminha TODO aclive — sem exceção","Come a cada 30–45min (60–90g carb/h)","Hidrata antes de sentir sede","Divide em blocos de 20km mentalmente","Nas noites, mantém ritmo conservador"].map(s=>`<div style="font-size:12px;color:#CCC;margin-bottom:4px;padding-left:10px;border-left:2px solid ${p.accent}88">${s}</div>`).join('')}</div></div>`}else{[{day:"Segunda-feira",data:w.seg,emoji:"🏋️"},{day:"Quarta-feira",data:w.qua,emoji:"🏃"},{day:"Sáb / Dom",data:w.fds,emoji:"⛰️"}].forEach(({day,data,emoji})=>{html+=`<div class="day-card" style="border:1px solid ${p.color}88"><div style="display:flex;justify-content:space-between;margin-bottom:8px"><div class="day-label">${day}</div><div style="font-size:16px">${emoji}</div></div><div class="day-type" style="color:${p.accent}">${data.type}</div><div class="day-detail">${data.detail}</div></div>`});html+=`<div class="aerobic-card"><div class="day-label" style="margin-bottom:6px">AERÓBICO COMPLEMENTAR</div><div style="font-size:12px;color:#AAA;line-height:1.5">🚴 ${w.aerobic}</div><div style="font-size:11px;color:#666;margin-top:6px;font-style:italic">Ter, Qui ou flexível — baixo impacto</div></div><div class="remember-card"><div class="day-label" style="margin-bottom:8px">📋 LEMBRE-SE</div>${["Pés + panturrilhas: mobilidade diária","Sono 7–8h: onde a melhora acontece","FC fácil = consegue conversar","Come antes de ter fome no longo"].map(r=>`<div class="remember-item">· ${r}</div>`).join('')}</div>`}html+='</div>';return html}
function renderHabits(){return`<div class="pad"><div class="section-label">Hábitos Diários — A Base do Ultra</div>${[{icon:"🦶",text:"Pés e panturrilhas — mobilidade diária (sim, todo dia)"},{icon:"😴",text:"Sono 7–8h. É onde você melhora, não no treino."},{icon:"🏃",text:"10min mobilidade ao acordar ou antes de dormir"},{icon:"🍽️",text:"Proteína em cada refeição. 1.6–2g/kg peso corporal/dia"},{icon:"💧",text:"Hidratação: urina amarela clara = hidratado"}].map(h=>`<div class="habit-card"><div class="habit-icon">${h.icon}</div><div class="habit-text">${h.text}</div></div>`).join('')}<div class="green-box"><div class="green-box-title">📊 Benchmarks para avançar de fase</div>${[["2h fácil sem dores no dia seguinte","Pronto para volume"],["Subidas longas sem câimbras","Panturrilhas adaptadas"],["60–90g carb/h sem GI issues","Nutrição validada"],["Ritmo fácil permanece fácil cansado","Base aeróbica sólida"]].map(([b,r])=>`<div class="benchmark"><div class="benchmark-text">${b}</div><div class="benchmark-result">→ ${r}</div></div>`).join('')}</div><div class="yellow-box"><div class="yellow-box-title">🧠 Os 4 Princípios do Ultra</div>${["Ultras não se vencem com km, mas com pernas duráveis + motor aeróbico estável.","Treino de força substitui milhas inúteis.","Consistência vem de ficar saudável, não de treinar mais forte.","Você não melhora no treino — você melhora na recuperação."].map((p,i)=>`<div class="principle-item">${i+1}. ${p}</div>`).join('')}</div></div>`}
function renderStrength(){return`<div class="pad"><div class="section-label">Treino de Força — Referência</div><div class="strength-card" style="background:#141414;border-color:#222;margin-bottom:12px"><div style="font-size:13px;color:#AAA;line-height:1.7;margin-bottom:8px"><strong style="color:#F5F0E8">Frequência:</strong> 2× semana</div><div style="font-size:13px;color:#AAA;line-height:1.7"><strong style="color:#F5F0E8">Progressão:</strong> Aumenta carga quando completa todas as séries com boa forma</div></div>${[{ex:"Agachamento / Trap-bar deadlift",sets:"3–4×6–10",note:"Força base"},{ex:"Split squat / Step-up",sets:"3×8–10/lado",note:"Unilateral"},{ex:"Elevação de panturrilha pesada",sets:"3×12–15",note:"Lenta na descida"},{ex:"RDL (Romanian Deadlift)",sets:"3–4×8–10",note:"Isquiotibiais"},{ex:"Farmer walk",sets:"3–4×40–50m",note:"Core e postura"},{ex:"Box jump / Drop jump",sets:"3×6–8",note:"Fase 2 em diante"}].map(s=>`<div class="strength-card"><div class="strength-name">${s.ex}</div><div class="strength-row"><div class="strength-sets">${s.sets}</div><div class="strength-note">${s.note}</div></div></div>`).join('')}<div class="red-box" style="margin-top:12px"><div class="red-box-title">⚠️ Regras de Força para Ultra</div>${["NUNCA faça força pesada no dia antes do longo","Após treino de força: 10min mobilidade obrigatório","Diminui carga em semanas de recuperação (20–25%)","Fase 4 (taper): força muito leve, só manutenção neural","Dor articular = para. Dor muscular = normal."].map(r=>`<div class="red-item">${r}</div>`).join('')}</div><div class="blue-box"><div class="blue-box-title">📅 Estrutura Semanal Modelo</div>${[["Seg","Força (principal)","rgba(122,143,224,0.2)"],["Ter","Aeróbico baixo impacto (opcional)","rgba(34,34,34,0.2)"],["Qua","Qualidade: ladeira / tempo / misto","rgba(82,183,136,0.2)"],["Qui","Descanso ou mobilidade","rgba(34,34,34,0.2)"],["Sex","Força (manutenção) ou descanso","rgba(122,143,224,0.2)"],["Sáb/Dom","LONGO — o treino mais importante","rgba(226,183,20,0.2)"]].map(([d,t,bg])=>`<div class="schedule-row" style="background:${bg}"><div class="schedule-day">${d}</div><div class="schedule-text">${t}</div></div>`).join('')}</div></div>`}
applyAccent();render();
</script>
